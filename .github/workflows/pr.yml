name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate types + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run types:check

      - name: Build
        run: npm run build
